version: '3.8'

name: earn4u

networks:
  earn4u-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  es_data:
  minio_data:
  kafka_data:

services:
  # ─── Data Stores ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: earn4u-postgres
    networks: [earn4u-net]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-earn4u}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-earn4u_secret}
      POSTGRES_DB: ${POSTGRES_DB:-earn4u_db}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../api/src/database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-earn4u} -d ${POSTGRES_DB:-earn4u_db}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: earn4u-redis
    networks: [earn4u-net]
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:3.7
    container_name: earn4u-kafka
    networks: [earn4u-net]
    ports:
      - '${KAFKA_PORT:-9092}:9092'
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics.sh --bootstrap-server localhost:9092 --list']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: earn4u-elasticsearch
    networks: [earn4u-net]
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    ports:
      - '${ELASTICSEARCH_PORT:-9200}:9200'
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # ─── Object Storage (S3-compatible) ────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: earn4u-minio
    networks: [earn4u-net]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-earn4u_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-earn4u_minio_secret}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2024-12-18T13-15-44Z
    container_name: earn4u-minio-init
    networks: [earn4u-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set earn4u http://minio:9000 ${MINIO_ROOT_USER:-earn4u_minio} ${MINIO_ROOT_PASSWORD:-earn4u_minio_secret};
      mc mb --ignore-existing earn4u/earn4u-media;
      mc anonymous set download earn4u/earn4u-media/public;
      echo 'MinIO bucket earn4u-media ready';
      "
    restart: 'no'

  # ─── Mail (dev SMTP + web UI) ──────────────────────────────
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: earn4u-mailpit
    networks: [earn4u-net]
    ports:
      - '${MAILPIT_SMTP_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'
    environment:
      MP_MAX_MESSAGES: 5000
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8025']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Observability ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: earn4u-prometheus
    networks: [earn4u-net]
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - ../monitoring/prometheus-docker.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped

  # ─── Application Services ────────────────────────────────────
  api:
    build:
      context: ../../api
      dockerfile: Dockerfile
      target: development
    container_name: earn4u-api
    networks: [earn4u-net]
    ports:
      - '${API_PORT:-3000}:3000'
    env_file:
      - ../../api/.env.docker
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9092
      ELASTICSEARCH_URL: http://elasticsearch:9200
      AWS_S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    volumes:
      - ../../api/src:/app/src:ro
      - ../../api/package.json:/app/package.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3000/api/v1/health/ready || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  worker:
    build:
      context: ../../workers
      dockerfile: Dockerfile
    container_name: earn4u-worker
    networks: [earn4u-net]
    env_file:
      - ../../workers/.env.docker
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9092
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build:
      context: ../../apps/admin
      dockerfile: Dockerfile
    container_name: earn4u-admin
    networks: [earn4u-net]
    ports:
      - '${ADMIN_PORT:-3001}:3001'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-3000}/api/v1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
