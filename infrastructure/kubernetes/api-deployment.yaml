apiVersion: apps/v1
kind: Deployment
metadata:
  name: earn4u-api
  namespace: earn4u-api
  labels:
    app: earn4u-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: earn4u-api
  template:
    metadata:
      labels:
        app: earn4u-api
    spec:
      containers:
        - name: api
          image: earn4u/api:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '3000'
          envFrom:
            - secretRef:
                name: earn4u-api-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: earn4u-api
  namespace: earn4u-api
spec:
  selector:
    app: earn4u-api
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: earn4u-api-hpa
  namespace: earn4u-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: earn4u-api
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
