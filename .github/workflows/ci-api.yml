name: CI — API

on:
  push:
    branches: [main, develop]
    paths: ['api/**', '.github/workflows/ci-api.yml']
  pull_request:
    branches: [main, develop]
    paths: ['api/**']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: earn4u
          POSTGRES_PASSWORD: earn4u_secret
          POSTGRES_DB: earn4u_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Lint
        working-directory: api
        run: npm run lint

      - name: Unit tests
        working-directory: api
        run: npm run test:cov
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: earn4u
          DATABASE_PASSWORD: earn4u_secret
          DATABASE_NAME: earn4u_test
          JWT_ACCESS_SECRET: test-secret-min-32-characters-long

      - name: Build
        working-directory: api
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: api
        run: docker build -t earn4u/api:${{ github.sha }} .
